services:
  app:
    image: ghcr.io/anome-ab/malarkrets:latest
    ports:
      - "3000:3000"
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      # DEV-ONLY: exposes postgres to the host so a local DB client (DBeaver, pgAdmin, psql)
      # can connect. Bound to 127.0.0.1 so it never leaks past this machine.
      # Port 5433 avoids clashing with a native postgres install on 5432.
      # REMOVE this block before deploying to a VPS — prod databases should only be
      # reachable from the app container over the Docker network.
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: malarkrets
      POSTGRES_USER: malarkrets
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-malarkrets_prod}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malarkrets"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_prod_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_prod_data:
  minio_prod_data:
