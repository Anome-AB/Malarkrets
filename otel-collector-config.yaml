# OpenTelemetry Collector config for shipping traces/metrics/logs to Dash0.
# Consumed by the `otel-collector` service in docker-compose.yml.
#
# Environment variables read at container start:
#   DASH0_AUTH_TOKEN    — Bearer token, ingestion scope. Required.
#   DEPLOYMENT_ENV      — "production" | "staging" | etc. Free-form.
#
# Logs: filelog-receivern är medvetet inte påslagen — /var/lib/docker/containers
# är mode 710 root:root vilket kräver faktisk root-access. App-logs skickas
# istället via OTel Logs SDK direkt från appen — se src/instrumentation.ts
# och src/lib/logger.ts. Appen exporterar OTLP HTTP till /v1/logs → denna
# collector → Dash0 via samma pipeline som traces.

receivers:
  # App pushes OTLP over HTTP (protobuf) from inside the docker network.
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

  # Per-container CPU / memory / network / disk.
  # api_version måste vara >= 1.40 för Docker 25+.
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    api_version: "1.40"
    collection_interval: 30s

  # VPS-host-nivå: total RAM, swap, CPU load, disk, filesystem, network.
  # Kompletterar docker_stats — som visar PER container, medan hostmetrics
  # visar TOTALEN inkl. OS, docker-daemon, Caddy-overhead, swap etc.
  #
  # root_path pekar på /hostfs där host's /proc, /sys, /dev är bindmountade
  # (se docker-compose.yml). Utan det läser receivern containerns /proc
  # vilket ger vilseledande mätvärden.
  #
  # process-scrapern är medvetet inte med: collectorn kör non-root i den
  # distroless imagen och kan inte läsa andra processers /proc/<pid>/.
  # Alla andra scrapers fungerar fint non-root via världsläsbara /proc-filer.
  hostmetrics:
    collection_interval: 30s
    root_path: /hostfs
    scrapers:
      # .utilization-metrics är "optional" i hostmetrics-receivern och
      # måste aktiveras explicit. Utan dem emitteras bara .usage (rå
      # bytes/antal med state-attribut) och varje dashboard/alert måste
      # räkna ut procenten själv. Vi aktiverar .utilization för CPU,
      # memory och filesystem eftersom det är dessa tre vi vill alerta på.
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      load:
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      paging:
      disk:
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
        exclude_mount_points:
          # Skippa Docker overlay/aufs-layers, tmpfs, och andra ephemeral
          # filsystem som spammar metrics utan att ge info om diskutrymme.
          mount_points:
            - /hostfs/dev/*
            - /hostfs/proc/*
            - /hostfs/sys/*
            - /hostfs/run/*
            - /hostfs/var/lib/docker/*
            - /hostfs/var/lib/kubelet/*
          match_type: regexp
      network:

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  resource:
    attributes:
      - key: deployment.environment
        value: "${env:DEPLOYMENT_ENV}"
        action: upsert
      - key: service.namespace
        value: malarkrets
        action: upsert

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

exporters:
  otlphttp/dash0:
    endpoint: https://ingress.eu-west-1.aws.dash0.com
    headers:
      Authorization: "Bearer ${env:DASH0_AUTH_TOKEN}"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/dash0]
    metrics:
      receivers: [otlp, docker_stats, hostmetrics]
      processors: [resource, batch]
      exporters: [otlphttp/dash0]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/dash0]
