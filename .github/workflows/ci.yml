name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check migration journal timestamps
        run: node scripts/check-migration-journal.mjs

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test (unit)
        run: bun run test

  integration:
    # Runs real SQL against a throwaway Postgres 16 (same version as prod).
    # Parallel with `verify` so total wall-clock stays ~45-60s.
    # Catches migration / schema / query regressions that mock-DB unit
    # tests cannot see.
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: bun run test:integration
